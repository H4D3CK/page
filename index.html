  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      cursor:none;
    }

    body{
      font-family:'Share Tech Mono',monospace;
      background:#050508;
      color:#00ffcc;
      overflow:hidden;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* MATRIX RAIN */

    canvas{
      position:fixed;
      top:0;
      left:0;
      z-index:-2;
    }

    /* GRID */

    .grid{
      position:fixed;
      width:200%;
      height:200%;
      background:
        linear-gradient(rgba(0,255,200,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,200,0.07) 1px, transparent 1px);
      background-size:40px 40px;
      transform:rotateX(65deg);
      animation:gridMove 10s linear infinite;
      z-index:-1;
    }

    @keyframes gridMove{
      0%{transform:rotateX(65deg) translateY(0);}
      100%{transform:rotateX(65deg) translateY(200px);}
    }

    /* CENTER */

    .center{
      text-align:center;
      z-index:10;
    }

    /* ASCII */

    .ascii{
      font-size:14px;
      line-height:14px;
      white-space:pre;
      color:#00ffc8;
      text-shadow:
        0 0 10px #00ffc8,
        0 0 20px #00ffc8,
        0 0 40px #00ffc8;
      margin-bottom:50px;
      min-height:140px;
    }

    /* ICON LINKS */

    .links{
      display:flex;
      gap:40px;
      justify-content:center;
    }

    .links a{
      opacity:0.7;
      transition:0.3s;
    }

    .links a:hover{
      opacity:1;
      transform:scale(1.3);
    }

    .links svg{
      width:28px;
      fill:#00ffc8;
      filter:drop-shadow(0 0 6px #00ffc8);
    }

    /* CURSOR */

    .cursor{
      width:18px;
      height:18px;
      border-radius:50%;
      background:#00ffc8;
      position:fixed;
      pointer-events:none;
      mix-blend-mode:screen;
      filter:blur(3px);
    }

    .icon{
      position:relative;
    }

    .icon:hover::after{
      content:attr(data-title);
      position:absolute;
      bottom:-32px;
      left:50%;
      transform:translateX(-50%);
      font-size:11px;
      letter-spacing:1px;
      color:#00ffc8;
      background:#020202;
      padding:4px 10px;
      border:1px solid #00ffc8;
      box-shadow:0 0 8px #00ffc8;
      white-space:nowrap;
      pointer-events:none;
      opacity:0;
      animation:tooltip 0.2s forwards;
    }

    @keyframes tooltip{
      from{
        opacity:0;
        transform:translateX(-50%) translateY(-5px);
      }
      to{
        opacity:1;
        transform:translateX(-50%) translateY(0);
      }
    }
  </style>

<script>

  /* MATRIX RAIN */

  const canvas = document.getElementById("matrix");
  const ctx = canvas.getContext("2d");

  canvas.height = window.innerHeight;
  canvas.width = window.innerWidth;

  const letters = "アァカサタナハマヤャラワ0123456789";
  const matrix = letters.split("");

  const fontSize = 14;
  const columns = canvas.width/fontSize;

  const drops = [];

  for(let x=0;x<columns;x++)
    drops[x]=1;

  function draw(){

    ctx.fillStyle="rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#00ffc8";
    ctx.font=fontSize+"px monospace";

    for(let i=0;i<drops.length;i++){

      const text=matrix[Math.floor(Math.random()*matrix.length)];

      ctx.fillText(text,i*fontSize,drops[i]*fontSize);

      if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
        drops[i]=0;

      drops[i]++;
    }

  }

  setInterval(draw,35);


  /* ASCII TYPE */

  const asciiText=`

██╗  ██╗ █████╗ ██████╗ ███████╗ ██████╗██╗  ██╗
██║  ██║██╔══██╗██╔══██╗██╔════╝██╔════╝██║ ██╔╝
███████║███████║██║  ██║█████╗  ██║     █████╔╝
██╔══██║██╔══██║██║  ██║██╔══╝  ██║     ██╔═██╗
██║  ██║██║  ██║██████╔╝███████╗╚██████╗██║  ██╗
╚═╝  ╚═╝╚═╝  ╚═╝╚═════╝ ╚══════╝ ╚═════╝╚═╝  ╚═╝

`;

  let i=0;
  function type(){

    document.getElementById("ascii").textContent+=asciiText.charAt(i);

    i++;

    if(i<asciiText.length)
      setTimeout(type,5);

  }

  type();


  /* CURSOR */

  const cursor=document.getElementById("cursor");

  document.addEventListener("mousemove",e=>{
    cursor.style.left=e.clientX+"px";
    cursor.style.top=e.clientY+"px";
  });

</script>
